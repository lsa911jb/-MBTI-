<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>청렴 MBTI 성향 테스트</title>

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(135deg, #74b9ff, #a29bfe);
  color: #333;
}

.container {
  max-width: 430px;
  margin: 35px auto;
  background: white;
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  text-align: center;
}

h2 { margin: 8px 0 5px; }

.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
  line-height: 1.5;
}

.main-copy {
  background: #f1f7ff;
  border-radius: 16px;
  padding: 14px;
  margin: 15px 0 20px;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.6;
}

#question {
  font-size: 18px;
  font-weight: 600;
  margin: 22px 0;
  line-height: 1.5;
}

button, .diary-btn {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
  text-decoration: none;
  display: block;
  box-sizing: border-box;
}

.btnA { background: #0984e3; color: white; }
.btnB { background: #00b894; color: white; }

button:hover, .diary-btn:hover {
  transform: scale(1.03);
}

.result-box {
  margin-top: 20px;
  padding: 22px;
  border-radius: 18px;
  color: white;
}

.type-title {
  font-size: 24px;
  font-weight: bold;
}

.result-img {
  width: 100%;
  max-width: 310px;
  border-radius: 18px;
  margin: 14px auto;
  display: block;
  background: white;
}

.action {
  margin-top: 12px;
  text-align: left;
  line-height: 1.8;
}

.diary-btn {
  background: #2d3436;
  color: white;
  font-weight: bold;
  margin-top: 15px;
}

.footer {
  margin-top: 18px;
  font-size: 13px;
  color: #777;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
  <h2>청렴 MBTI 테스트</h2>

  <div class="subtitle">
    전북특별자치도남원교육지원청<br>
    춘이·몽이와 함께 알아보는 나의 청렴 실천 스타일
  </div>

  <div class="main-copy">
    청렴의 기준은 원칙과 소통입니다.<br>
    기준은 하나, 실천은 다양하게!
  </div>

  <p id="question">시작 버튼을 눌러주세요</p>

  <div id="answers">
    <button onclick="startTest()">시작하기</button>
  </div>

  <div id="result"></div>
</div>

<script>
let q = 0;
let scores;

const resultImage = "img.png";
const naverFormUrl = "https://naver.me/FuNEYrFe";

const questions = [
  ["업무를 처리할 때 나는?", "규정과 절차를 먼저 확인한다", "상황과 사람의 맥락을 함께 본다"],
  ["민원인이 어려움을 호소하면?", "가능한 기준을 명확히 안내한다", "먼저 공감하고 설명한다"],
  ["기존 관행이 불합리해 보이면?", "규정에 맞게 바로잡는다", "개선 아이디어를 제안한다"],
  ["청렴 활동에 참여할 때 나는?", "정해진 방식에 성실히 참여한다", "새로운 방식으로 확산하고 싶다"],

  ["동료가 규정을 잘 모를 때 나는?", "정확한 기준을 알려준다", "이해하기 쉽게 풀어서 설명한다"],
  ["예외 상황이 생기면?", "원칙을 우선 적용한다", "규정 안에서 가능한 대안을 찾는다"],
  ["좋은 청렴 사례를 보면?", "내 업무에 조용히 적용한다", "다른 사람에게 공유하고 싶다"],
  ["업무 협조 요청을 받으면?", "업무 범위와 기준을 먼저 확인한다", "가능한 방법을 함께 찾아본다"],

  ["청렴을 실천하는 나의 방식은?", "흔들리지 않는 기준 지키기", "상대와 신뢰를 쌓는 소통"],
  ["문제가 반복될 때 나는?", "체계를 정비해야 한다고 생각한다", "조직문화 개선이 필요하다고 생각한다"],
  ["새로운 청렴 프로그램이 생기면?", "내용을 정확히 이해하고 참여한다", "재미있게 참여하고 주변에 알린다"],
  ["나에게 청렴이란?", "원칙을 지키는 힘", "함께 만들어가는 문화"]
];

const mapping = [
  ["기준명확형","유연적용형"],
  ["기준명확형","소통배려형"],
  ["기준명확형","실천확산형"],
  ["기준명확형","실천확산형"],

  ["기준명확형","소통배려형"],
  ["기준명확형","유연적용형"],
  ["유연적용형","실천확산형"],
  ["기준명확형","유연적용형"],

  ["기준명확형","소통배려형"],
  ["유연적용형","실천확산형"],
  ["소통배려형","실천확산형"],
  ["기준명확형","실천확산형"]
];

const types = {
  "기준명확형": {
    color:"#0984e3",
    desc:"기준을 분명히 지키는 신뢰형입니다.",
    actions:["규정 먼저 확인하기","기준을 명확히 설명하기","일관성 있는 업무 처리하기"]
  },
  "소통배려형": {
    color:"#6c5ce7",
    desc:"관계 속에서 신뢰를 만드는 조율형입니다.",
    actions:["상대 입장 고려하기","부드럽게 설명하기","공감 기반으로 전달하기"]
  },
  "유연적용형": {
    color:"#00b894",
    desc:"상황에 맞게 청렴을 적용하는 현실형입니다.",
    actions:["규정 범위 안에서 조정하기","가능한 대안 찾기","유연하되 기준은 지키기"]
  },
  "실천확산형": {
    color:"#fd79a8",
    desc:"청렴 문화를 넓히는 실행형입니다.",
    actions:["개선 의견 제안하기","좋은 사례 공유하기","청렴 실천 분위기 확산하기"]
  }
};

function startTest(){
  scores = {
    "기준명확형":0,
    "소통배려형":0,
    "유연적용형":0,
    "실천확산형":0
  };
  q = 0;
  document.getElementById("result").innerHTML = "";
  showQuestion();
}

function showQuestion(){
  if(q >= questions.length){
    showResult();
    return;
  }

  document.getElementById("question").innerText = `Q${q+1}. ${questions[q][0]}`;

  document.getElementById("answers").innerHTML = `
    <button class="btnA" onclick="answer(0)">${questions[q][1]}</button>
    <button class="btnB" onclick="answer(1)">${questions[q][2]}</button>
  `;
}

function answer(choice){
  scores[mapping[q][choice]]++;
  q++;
  showQuestion();
}

function showResult(){
  let resultType = Object.keys(scores).reduce((a,b) => scores[a] > scores[b] ? a : b);
  let t = types[resultType];

  document.getElementById("question").innerText = "나의 청렴 MBTI 결과";
  document.getElementById("answers").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="result-box" style="background:${t.color}">
      <div class="type-title">${resultType}</div>
     <img src="./img.png" alt="청렴한 춘이 몽이" class="result-img">
      <p>${t.desc}</p>

      <div class="action">
        ✔ ${t.actions[0]}<br>
        ✔ ${t.actions[1]}<br>
        ✔ ${t.actions[2]}
      </div>
    </div>

    <a class="diary-btn" href="${naverFormUrl}" target="_blank">
      👉 결과 제출하고 청렴 일기 참여하기
    </a>

    <button onclick="location.reload()">다시하기</button>

    <div class="footer">
      청렴의 기준은 원칙과 소통입니다.<br>
      기준은 하나, 실천은 다양하게!
    </div>
  `;
}
</script>

</body>
</html>
